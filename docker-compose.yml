services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claude-web-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
      - backend-storage:/app/storage
      # Persistent skills directory. The enllm runner loads SKILL.md from
      # $HOME/.enllm/skills/<name>/SKILL.md (engine-neutral — does not
      # require any vendor CLI to be installed). The named volume keeps
      # skill edits across container recreations.
      - enllm-skills:/root/.enllm/skills
    networks:
      - claude-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: claude-web-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - claude-net
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000

  nginx:
    image: nginx:alpine
    container_name: claude-web-nginx
    restart: unless-stopped
    ports:
      - "8010:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    # Join both: claude-net for internal upstream traffic (backend, frontend);
    # web-network for Nginx Proxy Manager on the production host.
    networks:
      - claude-net
      - web-network

networks:
  claude-net:
    driver: bridge
  # External network shared with Nginx Proxy Manager on the production
  # host. Declared `external: true` because the proxy stack creates and
  # owns it — recomposing this file must never recreate it (NPM would
  # lose its endpoint bindings). If the network doesn't exist on the
  # target host, create it once with:
  #   docker network create web-network
  # before running `docker compose up -d`.
  web-network:
    external: true

volumes:
  backend-data:
  backend-storage:
  enllm-skills:

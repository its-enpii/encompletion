services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claude-web-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
      - backend-storage:/app/storage
      # Persistent Claude Code skills directory. Claude CLI auto-discovers
      # skills at $HOME/.claude/skills/, so we mount a named volume there to
      # survive container restarts. Without this, any SKILL.md the user creates
      # via the UI would be wiped on container recreate.
      - claude-skills:/root/.claude/skills
    networks:
      - claude-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: claude-web-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - claude-net
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000

  nginx:
    image: nginx:alpine
    container_name: claude-web-nginx
    restart: unless-stopped
    ports:
      - "8008:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - claude-net

networks:
  claude-net:
    driver: bridge

volumes:
  backend-data:
  backend-storage:
  claude-skills:

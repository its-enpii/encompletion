services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: claude-web-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
      - backend-storage:/app/storage
      # Persistent skills directory. The enllm runner loads SKILL.md from
      # $HOME/.enllm/skills/<name>/SKILL.md (engine-neutral — does not
      # require any vendor CLI to be installed). The named volume keeps
      # skill edits across container recreations.
      - enllm-skills:/root/.enllm/skills
    networks:
      - claude-net
    healthcheck:
      # Debian base has curl but not wget; node image ships neither.
      # node -e reaches the in-process HTTP server via the loopback
      # bind without needing any external binary.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: claude-web-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - claude-net
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000

  nginx:
    # Custom build so we can drop a healthcheck-reload watchdog into
    # the same container as nginx. The alpine base already has wget
    # and sh; we just add one script file. Replaces the upstream-
    # nginx:alpine image so a backing container restart no longer
    # strands us with a stale DNS cache for an hour.
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: claude-web-nginx
    restart: unless-stopped
    ports:
      - "8010:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    # Join both: claude-net for internal upstream traffic (backend, frontend);
    # web-network for Nginx Proxy Manager on the production host.
    networks:
      - claude-net
      - web-network

  e2e:
    # Playwright runner. Container-only — never runs in production.
    # Mounts ./e2e so test sources sync from the host without rebuilding.
    # No `restart: unless-stopped` because the runner is one-shot: it
    # exits after the test suite completes, and `docker compose run`
    # will recreate the container on the next invocation. Depends on
    # nginx being healthy so the e2e suite can hit the full stack.
    build:
      context: ./e2e
      dockerfile: Dockerfile
    container_name: claude-web-e2e
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - claude-net
    environment:
      # Base URL for all tests. The e2e container resolves `nginx` via
      # the docker network's embedded DNS — same hostname the browser
      # would see when deployed behind Nginx Proxy Manager.
      - E2E_BASE_URL=http://nginx:80
      # Backend reachable directly (bypasses nginx) for fixtures that
      # need to set up DB rows before the browser logs in.
      - E2E_BACKEND_URL=http://backend:4000
    volumes:
      - ./e2e:/work
    # Stdout always tty so the runner's progress lines stream in real
    # time. Without this Compose pipes output through a pty and the
    # suite feels frozen.
    tty: true

networks:
  claude-net:
    driver: bridge
  # External network shared with Nginx Proxy Manager on the production
  # host. Declared `external: true` because the proxy stack creates and
  # owns it — recomposing this file must never recreate it (NPM would
  # lose its endpoint bindings). If the network doesn't exist on the
  # target host, create it once with:
  #   docker network create web-network
  # before running `docker compose up -d`.
  web-network:
    external: true

volumes:
  backend-data:
  backend-storage:
  enllm-skills:

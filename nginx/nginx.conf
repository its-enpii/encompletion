events { worker_connections 1024; }

http {
  # Passive fail detection: nginx marks the upstream "down" after 3
  # errors within 10s, then retries after 10s. Combined with
  # proxy_next_upstream on the /api/ location, this gives us soft
  # failover during backend recreate without needing the OSS-incompat
  # active health_check directive (which is a Nginx Plus feature).
  upstream backend {
    server backend:4000 max_fails=3 fail_timeout=10s;
    keepalive 16;
  }
  upstream frontend {
    server frontend:3000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    # Backend REST
    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 600s;
      # Retry on connection-level failures (502-504 are upstream blips,
      # not client errors). The active health-check marks the upstream
      # down when /api/health is unreachable; this directive only
      # retries during the brief window where the upstream is up but
      # the connection drops mid-request (e.g. backend restart).
      proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
      proxy_next_upstream_tries 2;
      proxy_next_upstream_timeout 3s;
    }

    # Embed widget static assets — widget.js for tenant apps. Hosted by
    # Express at /embed/* (mounted in server.js).
    location /embed/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # SSE stream endpoint — must come BEFORE the generic /api/ block so
    # nginx picks the more specific location by regex prefix. Needs
    # proxy_buffering off so chunks flush immediately to the client
    # (default buffers 4KB+ and would defeat streaming). Connection ""
    # keeps it on plain HTTP/1.1 keepalive (EventSource doesn't speak
    # HTTP/2 multiplex).
    location ~ ^/api/.+/runs/.+/stream$ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1h;
      proxy_set_header X-Accel-Buffering no;
    }

    # Frontend (Next.js)
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}

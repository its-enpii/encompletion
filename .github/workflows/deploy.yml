name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Cancel any in-flight deploy from a previous push so we never have two
  # `docker compose up` racing on the same host.
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        # Fail with a clear, actionable message if any required secret is
        # missing. appleboy/ssh-action would otherwise complain with a
        # less helpful "Host required" error at job boot.
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          KEY_LEN: ${{ secrets.DEPLOY_SSH_KEY && secrets.DEPLOY_SSH_KEY != '' && 'set' || 'missing' }}
          PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for name in HOST USER PATH_SECRET; do
            v=$(eval echo "\$$name")
            if [ -z "$v" ]; then
              echo "::error::Secret DEPLOY_${name} is empty. Add it in Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          if [ "$KEY_LEN" != "set" ]; then
            echo "::error::Secret DEPLOY_SSH_KEY is empty. Add it in Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ "$missing" = "1" ]; then
            exit 1
          fi
          echo "All DEPLOY_* secrets present."

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd '${{ secrets.DEPLOY_PATH }}'
            git fetch --prune origin
            git reset --hard origin/main
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
            docker compose ps


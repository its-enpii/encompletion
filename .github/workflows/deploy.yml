name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Cancel any in-flight deploy from a previous push so we never have two
  # `docker compose up` racing on the same host.
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          # Secrets — set these once in the repo's Settings → Secrets and
          # variables → Actions. The workflow fails fast if any are missing.
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Command stream — keep commands idempotent so retries are safe.
          # Each prompt shell expansion is single-quoted so the local
          # `envsubst` doesn't try to substitute `$PATH_TO_APP`.
          script: |
            set -euo pipefail
            cd '${{ secrets.DEPLOY_PATH }}'
            git fetch --prune origin
            git reset --hard origin/main
            # Pull only docker-ignored runtime concerns (none) and rebuild.
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
            docker compose ps
